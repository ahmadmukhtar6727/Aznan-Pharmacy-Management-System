{% extends 'inventory/base.html' %}
{% block content %}
<div class="row h-100">
    <!-- LEFT: Search & Select -->
    <div class="col-md-5 border-end">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">Select Product</div>
            <div class="card-body">
                <input type="text" id="drug-search" class="form-control mb-3" placeholder="Type drug name to search...">
                <select id="drug-list" class="form-select" size="10">
                    {% for med in medicines %}
                    <option value="{{ med.id }}" data-name="{{ med.name }}" data-retail="{{ med.retail_price }}" data-wholesale="{{ med.wholesale_price }}" data-stock="{{ med.quantity }}">
                        {{ med.name }} ({{ med.quantity }})
                    </option>
                    {% endfor %}
                </select>
                
                <div class="mt-3 p-3 bg-light rounded d-none" id="qty-area">
                    <div class="row g-2">
                        <div class="col-6"><label>Qty</label><input type="number" id="sale-qty" value="1" min="1" class="form-control"></div>
                        <div class="col-6"><label>Type</label>
                            <select id="price-type" class="form-select">
                                <option value="retail">Retail</option>
                                <option value="wholesale">Wholesale</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100 mt-3" onclick="addToCart()">Add to Basket <i class="bi bi-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- RIGHT: Cart & Finalize -->
    <div class="col-md-7">
        <div class="card shadow-sm h-100">
            <div class="card-header bg-dark text-white d-flex justify-content-between">
                <span>Basket / Cart</span>
                <span id="basket-total" class="fw-bold text-warning">₦0.00</span>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover" id="cart-table">
                    <thead class="table-light"><tr><th>Item</th><th>Type</th><th>Qty</th><th>Subtotal</th><th></th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="card-footer bg-white border-top">
                <div class="row g-2 mb-3">
                    <div class="col-md-4"><input type="text" id="cust-name" class="form-control" placeholder="Customer Name"></div>
                    <div class="col-md-4"><select id="pay-status" class="form-select"><option value="Paid">Paid</option><option value="Credit">Credit</option></select></div>
                    <div class="col-md-4"><input type="number" id="sale-discount" class="form-control" placeholder="Discount ₦" oninput="calculateNet()"></div>
                </div>
                <h4 class="text-end mb-3 text-primary">Total After Discount: ₦<span id="net-total">0.00</span></h4>
                <button class="btn btn-success w-100 btn-lg" onclick="finalizeSale()">Finalize & Print Receipt</button>
            </div>
        </div>
    </div>
</div>

<script>
// Search Filter
document.getElementById('drug-search').addEventListener('input', function() {
    let filter = this.value.toLowerCase();
    let options = document.querySelectorAll('#drug-list option');
    options.forEach(opt => opt.style.display = opt.text.toLowerCase().includes(filter) ? '' : 'none');
});

document.getElementById('drug-list').addEventListener('change', () => document.getElementById('qty-area').classList.remove('d-none'));

let cart = [];

function addToCart() {
    let select = document.getElementById('drug-list');
    let opt = select.options[select.selectedIndex];
    let type = document.getElementById('price-type').value;
    let price = type === 'retail' ? opt.dataset.retail : opt.dataset.wholesale;
    let qty = document.getElementById('sale-qty').value;

    cart.push({ id: opt.value, name: opt.dataset.name, qty: qty, price: price, price_type: type, subtotal: qty * price });
    renderCart();
}

function renderCart() {
    let html = ''; let total = 0;
    cart.forEach((item, index) => {
        total += item.subtotal;
        html += `<tr><td>${item.name}</td><td>${item.price_type}</td><td>${item.qty}</td><td>₦${item.subtotal}</td>
                 <td><button class="btn btn-sm btn-outline-danger" onclick="cart.splice(${index},1);renderCart()">x</button></td></tr>`;
    });
    document.querySelector('#cart-table tbody').innerHTML = html;
    document.getElementById('basket-total').innerText = '₦' + total.toFixed(2);
    calculateNet();
}

function calculateNet() {
    let gross = parseFloat(document.getElementById('basket-total').innerText.replace('₦','')) || 0;
    let disc = parseFloat(document.getElementById('sale-discount').value) || 0;
    document.getElementById('net-total').innerText = (gross - disc).toFixed(2);
}

function finalizeSale() {
    if(cart.length === 0) return alert("Basket is empty!");
    
    let saleData = {
        customer_name: document.getElementById('cust-name').value || "Walking Customer",
        payment_status: document.getElementById('pay-status').value,
        discount: document.getElementById('sale-discount').value || 0,
        items: cart
    };

    fetch('/process-sale/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
        body: JSON.stringify(saleData)
    }).then(res => res.json()).then(data => {
        if(data.success) {
            // Updated to use the professional 80mm Receipt URL
            const receiptUrl = `/receipt/${data.sale_id}/`;
            const receiptWin = window.open(receiptUrl, 'Receipt', 'width=400,height=600');
            
            // Give the user a moment to see the success before reloading
            setTimeout(() => {
                location.reload();
            }, 1000);
        } else {
            alert("Error: " + data.message);
        }
    });
}
</script>
{% endblock %}
