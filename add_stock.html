{% extends 'inventory/base.html' %}
{% block content %}
<div class="container-fluid">
    <div class="card shadow-sm col-md-8 mx-auto">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Add New Medicine to Stock</h5>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Drug Name</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Paracetamol 500mg" required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="2" placeholder="Dosage or storage info..."></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Quantity</label>
                        <input type="number" name="quantity" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Expiry Date</label>
                        <input type="date" name="expiry_date" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Category</label>
                        <!-- ADDED 'required' BELOW TO FIX VALUEERROR -->
                        <select name="category" class="form-select" required>
                            <option value="">Select Category</option>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Buying Price (₦)</label>
                        <input type="number" step="0.01" name="buying_price" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Wholesale Price (₦)</label>
                        <input type="number" step="0.01" name="wholesale_price" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Retail Price (₦)</label>
                        <input type="number" step="0.01" name="retail_price" class="form-control" required>
                    </div>
                </div>
                <hr>
                <div class="d-flex justify-content-between">
                    <a href="{% url 'inventory_list' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success px-5">Save to Inventory</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
