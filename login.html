{% extends 'inventory/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h4>Aznan Pharmacy Login</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login to System</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Special CSS for Login page to hide the sidebar since we aren't logged in yet -->
<style>
    #sidebar { display: none !important; }
    body { background: #343a40 !important; }
</style>
{% endblock %}
